<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat entre Utilisateurs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-box">
            <!-- Messages affichés ici -->
            <div class="message received">
                <p><strong>Utilisateur 1:</strong> Salut, comment ça va ?</p>
            </div>
            <div class="message sent">
                <p><strong>Utilisateur 2:</strong> Ça va bien, merci ! Et toi ?</p>
            </div>
            <div class="message received">
                <p><strong>Utilisateur 1:</strong> Ça va, merci !</p>
            </div>
        </div>
        
        <!-- Zone de saisie pour envoyer un message -->
        <div class="input-box">
            <textarea placeholder="Écrire un message..." rows="3"></textarea>
            <button>Envoyer</button>
        </div>
    </div>
</body>
</html>
